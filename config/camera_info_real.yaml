# Real A2 front camera intrinsics — equidistant (fisheye) distortion.
# Calibrated at 1280x720, scaled by 0.5 to 640x360 (fx/fy/cx/cy/skew * 0.5;
# distortion coefficients are scale-invariant and unchanged).
# Loaded by gscam2 via a2_pc2 camera.launch.py / pc2.launch.py and published
# on /camera/camera_info.
#
# distortion_model: equidistant — Kannala-Brandt fisheye, coefficients [k1,k2,k3,k4].
